name: Simple CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-repo:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Show repository files
      - name: List files
        run: ls -la

      # Step 3: Show current branch
      - name: Show branch
        run: git branch
